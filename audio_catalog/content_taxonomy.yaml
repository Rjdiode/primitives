# Maps model labels + Demucs stems → canonical content categories.
version: content_taxonomy_v1

categories:
  voice:
    stem: vocals
    stem_threshold: 0.08
    tags:
      - Speech
      - Singing
      - Choir
      - Narration, monologue
      - Child speech, kid speaking
      - Conversation
      - Yodeling
      - Chant
    # FSD50K labels (Essentia FSD-SINet)
    fsd_tags:
      - Male speech, man speaking
      - Female speech, woman speaking
      - Child speech, kid speaking
      - Conversation
      - Narration, monologue
      - Singing
      - Choir
      - Yodeling
      - Chant
    tag_threshold: 0.25

  bass:
    stem: bass
    stem_threshold: 0.08
    tags:
      - Bass guitar
      - Double bass
      - Bass drum
    fsd_tags:
      - Bass guitar
      - Double bass
      - Bass drum
    tag_threshold: 0.20

  drums:
    stem: drums
    stem_threshold: 0.10
    tags:
      - Drum
      - Drum kit
      - Snare drum
      - Bass drum
      - Percussion
      - Hi-hat
      - Cymbal
      - Timpani
    fsd_tags:
      - Drum
      - Drum kit
      - Snare drum
      - Bass drum
      - Percussion
      - Hi-hat
      - Cymbal
      - Timpani
      - Tabla
    tag_threshold: 0.20

  orchestra:
    tags:
      - Orchestra
      - String section
      - Brass instrument
      - Bowed string instrument
      - Violin, fiddle
      - Cello
      - Viola
      - French horn
      - Trumpet
      - Trombone
      - Timpani
    fsd_tags:
      - Orchestra
      - String section
      - Brass instrument
      - Violin, fiddle
      - Cello
      - Viola
      - French horn
      - Trumpet
      - Trombone
      - Classical music
    tag_threshold: 0.20
    # Heuristic: high "other" stem + low vocals/drums often accompanies orchestral material.
    other_stem_min: 0.35
    vocals_stem_max: 0.15
    drums_stem_max: 0.15

speech_tags:
  - Speech
  - Narration, monologue
  - Conversation
  - Child speech, kid speaking
  - Speech synthesizer

singing_tags:
  - Singing
  - Choir
  - Yodeling
  - Chant
  - Child singing
